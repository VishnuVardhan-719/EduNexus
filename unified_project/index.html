<!-- CO1: Internet Fundamentals, HTML Structure & Basic CSS -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexus – Login</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-page">

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <i class="bi bi-mortarboard-fill"></i>
    </div>

    <h2>EduNexus</h2>
    <p class="subtitle">Smart Student Management & Study Planning</p>

    <!-- Demo hint -->
    <div class="demo-hint">
      <i class="bi bi-info-circle me-1"></i>
      Demo credentials — Email: <strong>student@edunexus.edu</strong> &nbsp;|&nbsp; Password: <strong>any</strong>
    </div>

    <!-- Login Form -->
    <!-- CO2: Forms, Semantic HTML & Advanced CSS Layouts -->
    <form id="loginForm" novalidate>
      <div class="en-form-group">
        <label class="en-label" for="email">
          <i class="bi bi-envelope me-1"></i>University Email
        </label>
        <input type="email" class="en-input" id="email" placeholder="student@edunexus.edu" value="student@edunexus.edu"
          required />
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>

      <div class="en-form-group">
        <label class="en-label" for="password">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <div class="input-group">
          <input type="password" class="form-control en-input" id="password" placeholder="Enter your password"
            value="password123" required style="border-radius:10px 0 0 10px; border-right:none;" />
          <span class="input-group-text" id="togglePwd" title="Show/Hide password">
            <i class="bi bi-eye-slash" id="eyeIcon"></i>
          </span>
        </div>
      </div>

      <div class="d-flex align-items-center justify-content-between mb-4" style="font-size:.85rem;">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="remember" checked />
          <label class="form-check-label text-muted" for="remember">Remember me</label>
        </div>
        <span style="color:var(--primary);font-weight:600;cursor:pointer;"
          onclick="showToast('Password reset link sent!')">Forgot password?</span>
      </div>

      <button type="submit" class="btn-primary-grad">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login to EduNexus
      </button>
    </form>

    <div class="login-footer mt-3">
      New student? <span onclick="showToast('Contact your university admin to register.')">Request access</span>
    </div>

    <!-- Stats row -->
    <div class="d-flex justify-content-around mt-4 pt-3" style="border-top:1px solid #eaf0fb;">
      <div class="text-center">
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary);">2,400+</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">Students</div>
      </div>
      <div style="width:1px;background:#eaf0fb;"></div>
      <div class="text-center">
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary);">120+</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">Courses</div>
      </div>
      <div style="width:1px;background:#eaf0fb;"></div>
      <div class="text-center">
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary);">98%</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">Success Rate</div>
      </div>
    </div>
  </div>

  <script>
    // CO3: JavaScript Programming Fundamentals
    // CO4: DOM Manipulation, Events & API Integration
    // Toggle password visibility
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const eye = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        eye.className = 'bi bi-eye';
      } else {
        pwd.type = 'password';
        eye.className = 'bi bi-eye-slash';
      }
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value.trim();
      if (!email || !pwd) { showToast('Please fill in all fields.', 'warning'); return; }

      // Simulate login
      const btn = e.target.querySelector('button[type=submit]');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in…';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    });

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      const icon = type === 'warning' ? 'exclamation-triangle-fill' : 'check-circle-fill';
      t.className = 'en-toast';
      t.innerHTML = `<i class="bi bi-${icon}"></i> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }
  </script>
</body>

</html>
